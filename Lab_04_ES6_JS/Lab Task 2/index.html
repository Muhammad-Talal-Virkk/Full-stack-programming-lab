<!DOCTYPE html>
<html>
<head>
    <title>Lab Task 2 - Image Gallery</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body { font-family: Arial; text-align: center; padding: 20px; }
        img { width: 300px; height: 200px; }
        #caption { margin-top: 10px; }
        button { margin: 10px; }
    </style>
</head>
<body>

<h2>Image Gallery</h2>

<img id="galleryImage" src="https://picsum.photos/id/1015/300/200">
<p id="caption">Image 1</p>

<button id="prev">Previous</button>
<button id="next">Next</button>

<script>
$(document).ready(function(){

    var images = [
        {src:"https://picsum.photos/id/1015/300/200", text:"Image 1"},
        {src:"https://picsum.photos/id/1025/300/200", text:"Image 2"},
        {src:"https://picsum.photos/id/1035/300/200", text:"Image 3"}
    ];

    var index = 0;

    function showImage(){
        $("#galleryImage").fadeOut(300, function(){
            $(this).attr("src", images[index].src).fadeIn(300);
            $("#caption").text(images[index].text);
        });
    }

    $("#next").click(function(){
        index = (index + 1) % images.length;
        showImage();
    });

    $("#prev").click(function(){
        index = (index - 1 + images.length) % images.length;
        showImage();
    });

});
</script>

</body>
</html>
